name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v3  # Updated to v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3  # Updated to v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'  # You can also try removing this if issues persist
    
    - run: npm ci  # Using ci instead of install for more reliable builds
    - run: npm start
    const express = require('express');
const bodyParser = require('body-parser');
const axios = require('axios');

const app = express();
app.use(bodyParser.json());

const PAGE_ACCESS_TOKEN = "YOUR_PAGE_ACCESS_TOKEN";
const VERIFY_TOKEN = "verify_token";

// 🔐 Webhook verify
app.get('/webhook', (req, res) => {
  if (req.query['hub.verify_token'] === VERIFY_TOKEN) {
    return res.send(req.query['hub.challenge']);
  }
  res.sendStatus(403);
});

// 📩 Receive message
app.post('/webhook', (req, res) => {
  const body = req.body;

  if (body.object === 'page') {
    body.entry.forEach(entry => {
      const event = entry.messaging[0];
      const sender = event.sender.id;

      if (event.message && event.message.text) {
        replyMessage(sender, event.message.text);
      }
    });

    res.status(200).send("EVENT_RECEIVED");
  }
});

// 🧠 Smart reply function
async function replyMessage(sender, text) {
  let reply;

  text = text.toLowerCase();

  if (text.includes("hi") || text.includes("hello")) {
    reply = "Hello 👋 কেমন আছেন?";
  } 
  else if (text.includes("kemon aso")) {
    reply = "আমি ভালো আছি 😊 আপনি কেমন আছেন?";
  }
  else if (text.includes("name")) {
    reply = "আমি একটা smart Messenger bot 🤖";
  }
  else {
    reply = "দুঃখিত 😔 আমি বুঝতে পারিনি, আরেকটু সহজ করে বলবেন?";
  }

  sendMessage(sender, reply);
}

// 📤 Send message
function sendMessage(sender, text) {
  axios.post(`https://graph.facebook.com/v18.0/me/messages?access_token=${PAGE_ACCESS_TOKEN}`, {
    recipient: { id: sender },
    message: { text: text }
  }).catch(err => console.log(err.response.data));
}

// 🚀 Run server
app.listen(3000, () => console.log("Bot is running 24/7 🚀"));
